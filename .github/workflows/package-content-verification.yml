name: Package Content Verification

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/**"
      - ".gitmodules"
      - "pyproject.toml"
      - "setup.py"
      - "MANIFEST.in"
      - "constraints-dev.txt"
      - "src/embit/util/ctypes_secp256k1.py"
      - "docs/package-content-policy.md"
      - "tools/verify_package_artifacts.py"
      - "secp256k1/**"
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".gitmodules"
      - "pyproject.toml"
      - "setup.py"
      - "MANIFEST.in"
      - "constraints-dev.txt"
      - "src/embit/util/ctypes_secp256k1.py"
      - "docs/package-content-policy.md"
      - "tools/verify_package_artifacts.py"
      - "secp256k1/**"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: constraints-dev.txt

      - name: Verify vendored submodule URL
        run: grep -nE '^[[:space:]]*url = https://github.com/ElementsProject/secp256k1-zkp\.git$' .gitmodules

      - name: Install pinned CI dependencies
        run: python -m pip install --upgrade pip && python -m pip install --require-hashes -r constraints-dev.txt

      - name: Install build frontend
        run: python -m pip install --no-deps build==1.2.2.post1

      - name: Build artifacts
        run: python -m build --sdist --wheel --no-isolation

      - name: Verify artifacts and metadata
        run: python tools/verify_package_artifacts.py --inspection-log .ai/runs/package-content-verification.md

      - name: Upload inspection log
        uses: actions/upload-artifact@v4
        with:
          name: package-content-verification
          path: .ai/runs/package-content-verification.md
