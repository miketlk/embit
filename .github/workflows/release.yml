name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build and verify release artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      release_tag: ${{ steps.resolve-tag.outputs.release_tag }}
    steps:
      - name: Resolve release tag
        id: resolve-tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "release_tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "release_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve-tag.outputs.release_tag }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify tag exists locally
        run: git rev-parse --verify "refs/tags/${{ steps.resolve-tag.outputs.release_tag }}"

      - name: Verify tag commit is merged into default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git fetch --no-tags origin "${DEFAULT_BRANCH}"
          TAG_COMMIT="$(git rev-parse HEAD)"
          git merge-base --is-ancestor "$TAG_COMMIT" "origin/${DEFAULT_BRANCH}"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install pinned CI dependencies
        run: python -m pip install --upgrade pip && python -m pip install --require-hashes -r constraints-dev.txt

      - name: Install build frontend
        run: python -m pip install --no-deps build==1.2.2.post1

      - name: Install package
        run: python -m pip install --no-deps -e .

      - name: Run tests
        run: pytest

      - name: Build artifacts
        run: python -m build --sdist --wheel --no-isolation

      - name: Verify artifacts
        run: python tools/verify_package_artifacts.py --inspection-log .ai/runs/release-package-inspection.md

      - name: Generate release checksums
        working-directory: dist
        run: sha256sum * > SHA256SUMS

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle-${{ steps.resolve-tag.outputs.release_tag }}
          path: |
            dist/*
            .ai/runs/release-package-inspection.md

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs:
      - build
    environment:
      name: pypi
    permissions:
      contents: read
      attestations: write
      id-token: write
    steps:
      - name: Download validated release bundle
        uses: actions/download-artifact@v4
        with:
          name: release-bundle-${{ needs.build.outputs.release_tag }}
          path: release-bundle

      - name: Verify artifact hashes
        working-directory: release-bundle/dist
        run: sha256sum --check SHA256SUMS

      - name: Generate build attestations
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: release-bundle/dist/*

      - name: Publish release artifacts
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: release-bundle/dist
