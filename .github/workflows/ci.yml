name: CI

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  actionlint:
    name: Workflow lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: rhysd/actionlint@v1

  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: constraints-dev.txt

      - name: Install pinned CI dependencies
        run: python -m pip install --upgrade pip && python -m pip install --require-hashes -r constraints-dev.txt

      - name: Install package
        run: python -m pip install --no-deps -e .

      - name: Ruff
        run: ruff check .

      - name: Tests
        run: pytest

  package:
    name: Build and verify artifacts
    runs-on: ubuntu-latest
    needs:
      - actionlint
      - tests
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: constraints-dev.txt

      - name: Install pinned CI dependencies
        run: python -m pip install --upgrade pip && python -m pip install --require-hashes -r constraints-dev.txt

      - name: Install build frontend
        run: python -m pip install --no-deps build==1.2.2.post1

      - name: Build artifacts
        run: python -m build --sdist --wheel --no-isolation

      - name: Verify built artifacts
        run: python tools/verify_package_artifacts.py --inspection-log .ai/runs/ci-package-inspection.md

      - name: Smoke install from local artifacts
        run: |
          python -m venv .venv-smoke
          . .venv-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install --no-index --find-links dist embit
          python -c "import embit; print(embit.__file__)"

      - name: Upload inspection log
        uses: actions/upload-artifact@v4
        with:
          name: ci-package-inspection
          path: .ai/runs/ci-package-inspection.md
